<svg xmlns="http://www.w3.org/2000/svg" width="520" height="180" viewBox="0 0 520 180" role="img" aria-label="Logo TE imaginada com base geometrica">
  <defs>
    <pattern id="grid" width="12" height="12" patternUnits="userSpaceOnUse">
      <path d="M 12 0 L 0 0 0 12" fill="none" stroke="#d8d8d8" stroke-width="1" />
    </pattern>
  </defs>

  <rect width="520" height="180" fill="#f7f7f7" />
  <rect width="520" height="180" fill="url(#grid)" />

  <g fill="#0a0a0a">
    <!-- Top bar with fixed diagonal cut in the cell beside the T junction -->
    <path fill-rule="evenodd" d="M 40 30 H 340 V 42 H 40 Z M 148 30 L 148 42 L 160 30 Z" />

    <!-- T stem with fixed diagonal cut in the top junction cell -->
    <path fill-rule="evenodd" d="M 136 42 H 148 V 138 H 136 Z M 136 42 L 136 54 L 148 42 Z" />

    <!-- E stem + middle bar + bottom bar with fixed first-cell diagonal cut -->
    <path fill-rule="evenodd" d="M 232 42 H 244 V 138 H 232 Z M 244 78 H 340 V 90 H 244 Z M 244 126 H 340 V 138 H 244 Z M 244 126 L 244 138 L 256 138 Z" />
  </g>
</svg>
